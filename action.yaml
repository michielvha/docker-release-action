name: 'Build and release a Docker Image'
description: 'A reusable action to build and release Docker images with automatic version detection'
author: 'michielvha'
branding:
  icon: arrow-right-circle
  color: blue
inputs:
  version:
    description: 'GitVersion version to use'
    required: false
    default: 'dev'
  username:
    description: 'Docker Hub username'
    required: true
  password:
    description: 'Docker Hub password or token'
    required: true
  project:
    description: 'Docker image name (e.g., edgeforge/erm)'
    required: true
  platforms:
    description: 'Target platforms for Docker build'
    required: false
    default: 'linux/amd64'
  context:
    description: 'Docker build context'
    required: false
    default: '.'
  build-args:
    description: 'Additional build arguments to pass to Docker build (multiline string, e.g., "ARG1=value1\nARG2=value2"). IMAGE_NAME will be automatically set to the project name.'
    required: false
  registry:
    description: 'optionally specify any OCI complaint registry, common ones include docker.io, ghcr.io, gcr.io, quay.io, defaults to docker hub.'
    default: 'docker.io'
  cache-from:
    description: 'List of external cache sources for BuildKit (e.g. "type=gha,scope=my-workflow"). Leave empty to disable caching.'
    required: false
    default: ''
  cache-to:
    description: 'List of cache export destinations for BuildKit (e.g. "type=gha,scope=my-workflow,mode=max"). Leave empty to disable caching.'
    required: false
    default: ''
  trivy-scan:
    description: 'Enable Trivy vulnerability scanning of the built image'
    required: false
    default: 'true'
  trivy-severity:
    description: 'Trivy severity levels to report (comma-separated)'
    required: false
    default: 'HIGH,CRITICAL'
  trivy-exit-code:
    description: 'Exit code when vulnerabilities are found (0 = report only, 1 = fail)'
    required: false
    default: '0'
  trivy-format:
    description: 'Trivy output format (table, json, sarif, cyclonedx, spdx-json) - sarif requires `security-events: write` permission and GHAS enabled (pro feature)'
    required: false
    default: 'table'
outputs:
  image-digest:
    description: 'Docker image digest'
    value: ${{ steps.build-push.outputs.digest }}
runs:
  using: 'composite'
  steps:
    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build and push Docker image
      id: build-push
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.context }}
        push: true
        tags: |
          ${{ inputs.registry }}/${{ inputs.username }}/${{ inputs.project }}:${{ inputs.version }}
          ${{ inputs.registry }}/${{ inputs.username }}/${{ inputs.project }}:latest
          ${{ inputs.registry }}/${{ inputs.username }}/${{ inputs.project }}:${{ github.sha }}
        platforms: ${{ inputs.platforms }}
        build-args: |
          IMAGE_NAME=${{ inputs.project }}
          ${{ inputs.build-args }}
        cache-from: ${{ inputs.cache-from }}
        cache-to: ${{ inputs.cache-to }}

    - name: Scan image with Trivy
      if: ${{ inputs.trivy-scan == 'true' }}
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
      with:
        scan-type: image
        image-ref: ${{ inputs.registry }}/${{ inputs.username }}/${{ inputs.project }}:${{ inputs.version }}
        severity: ${{ inputs.trivy-severity }}
        exit-code: ${{ inputs.trivy-exit-code }}
        format: ${{ inputs.trivy-format }}
        output: trivy-results.txt

    - name: Post Trivy results to summary
      if: ${{ inputs.trivy-scan == 'true' && inputs.trivy-format == 'table' && always() }}
      shell: bash
      run: |
        if [ -s trivy-results.txt ]; then
          echo "## Trivy Scan Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat trivy-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        else
          echo "## Trivy Scan — No vulnerabilities found" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload Trivy SARIF to GitHub Security
      if: ${{ inputs.trivy-scan == 'true' && inputs.trivy-format == 'sarif' && always() }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: trivy-results.txt
        category: trivy-image

    - name: Log out from Docker Hub
      shell: bash
      run: docker logout
